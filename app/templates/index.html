<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Task Board</title>
  <style>
    /* ---- Reset & base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(99, 102, 241, .25);
    }
    .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; }
    .header p  { font-size: .95rem; opacity: .85; margin-top: .35rem; }

    /* ---- Board container ---- */
    .board {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem 3rem;
    }

    /* ---- Loading / error states ---- */
    .status-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: #64748b;
      font-size: 1rem;
    }

    /* ---- Task card ---- */
    .task-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: box-shadow .2s, transform .15s;
    }
    .task-card:hover {
      box-shadow: 0 4px 16px rgba(99,102,241,.12), 0 1px 4px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }

    .task-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: .5rem;
    }

    /* ---- Meta badges ---- */
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .75rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .82rem;
      padding: .25rem .7rem;
      border-radius: 999px;
      font-weight: 500;
    }
    .badge-assignee {
      background: #ede9fe;
      color: #6d28d9;
    }
    .badge-deadline {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-icon { font-size: .95rem; }

    /* ---- Evidence toggle button ---- */
    .evidence-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: transparent;
      border: 1.5px solid #c7d2fe;
      color: #6366f1;
      font-size: .85rem;
      font-weight: 600;
      padding: .4rem .9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .evidence-btn:hover {
      background: #eef2ff;
      border-color: #818cf8;
    }
    .evidence-btn .arrow {
      transition: transform .2s;
      font-size: .7rem;
    }
    .evidence-btn.open .arrow { transform: rotate(90deg); }

    /* ---- Evidence panel ---- */
    .evidence-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease, padding .3s ease;
    }
    .evidence-panel.open {
      max-height: 600px;
      padding-top: .75rem;
    }

    .evidence-item {
      background: #f8fafc;
      border-left: 3px solid #818cf8;
      border-radius: 6px;
      padding: .7rem 1rem;
      margin-top: .5rem;
    }
    .evidence-speaker {
      font-weight: 600;
      color: #6366f1;
      font-size: .85rem;
      margin-bottom: .15rem;
    }
    .evidence-text {
      color: #334155;
      font-size: .92rem;
      font-style: italic;
    }
    .evidence-sid {
      font-size: .75rem;
      color: #94a3b8;
      margin-top: .25rem;
    }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      padding: 1.5rem 1rem;
      color: #94a3b8;
      font-size: .8rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📋 Meeting Action Items</h1>
    <p>Extracted tasks with transcript evidence traceability</p>
  </div>

  <div class="board" id="board">
    <div class="status-msg" id="loading">Loading tasks…</div>
  </div>

  <div class="footer">
    Meeting Action Extractor — STEP 6: Task Board UI
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
